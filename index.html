<!DOCTYPE html>
<html>
<head>
<title>Lamborghini Drive</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:skyblue;
}
#burj{
    position:absolute;
    right:50px;
    bottom:100px;
    width:80px;
    height:400px;
    background:silver;
    clip-path:polygon(50% 0%,70% 20%,65% 100%,35% 100%,30% 20%);
}
#road{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background:#333;
}
.line{
    position:absolute;
    width:60px;
    height:10px;
    background:white;
    bottom:95px;
    animation:move 1s linear infinite;
}
@keyframes move{
    from{left:100%;}
    to{left:-100px;}
}
#car{
    position:absolute;
    bottom:40px;
    left:100px;
    font-size:80px;
}
</style>
</head>
<body>

<div id="burj"></div>
<div id="road"></div>

<div class="line" style="animation-delay:0s"></div>
<div class="line" style="animation-delay:0.3s"></div>
<div class="line" style="animation-delay:0.6s"></div>

<div id="car">🏎️</div>

<script>
let car=document.getElementById("car");

document.addEventListener("keydown",e=>{
    let x=car.offsetLeft;
    if(e.key==="ArrowRight") car.style.left=(x+20)+"px";
    if(e.key==="ArrowLeft") car.style.left=(x-20)+"px";
});
</script>

</body>
</html>
